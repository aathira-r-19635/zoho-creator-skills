<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas</title>
  <!-- Creator JS SDK v1 (verified host). Atlas uses ONLY ZOHO.CREATOR.API + UTIL. -->
  <script src="https://js.zohostatic.com/creator/widgets/version/1.0/widgetsdk-min.js"></script>
  <style>
    /* ===================== Theme tokens ===================== */
    :root {
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Helvetica, Arial, sans-serif;
      --mono: ui-monospace, "SF Mono", Menlo, monospace;
      --accent: #6366f1; --accent-2: #8b5cf6;
      --accent-grad: linear-gradient(135deg, var(--accent), var(--accent-2));
      /* ---- Bezier easing system (used end-to-end across every view) ---- */
      --ease-emphatic: cubic-bezier(.22, 1, .36, 1);     /* decelerate — enters, route transitions */
      --ease-spring:   cubic-bezier(.34, 1.56, .64, 1);  /* overshoot — cards, chips, popovers */
      --ease-smooth:   cubic-bezier(.4, 0, .2, 1);       /* standard — hovers, color/opacity */
      --ease-exit:     cubic-bezier(.4, 0, 1, 1);        /* accelerate — exits */
      --t-fast: .16s; --t: .28s; --t-slow: .5s;
      --radius: 14px; --radius-sm: 10px;
    }
    html[data-theme="dark"] {
      --bg: #0b0d13; --bg-2: #11141d; --surface: #161a25; --surface-2: #1c2131; --surface-3: #232a3b;
      --border: #2a3142; --border-2: #353e54; --text: #e9ebf2; --text-muted: #9aa3b8; --text-faint: #6b7488;
    }
    html[data-theme="light"] {
      --bg: #f4f6fb; --bg-2: #eef1f7; --surface: #fff; --surface-2: #f7f9fc; --surface-3: #eef1f7;
      --border: #e2e7f0; --border-2: #d2dae6; --text: #1a2030; --text-muted: #5a6477; --text-faint: #98a1b3;
    }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

    /* ===================== Animation system (bezier, reusable) ===================== */
    /* Route/view transition */
    .view { animation: viewIn var(--t-slow) var(--ease-emphatic) both; }
    @keyframes viewIn { from { opacity: 0; transform: translateY(14px) scale(.99); } to { opacity: 1; transform: none; } }
    /* Card/list-item enter (stagger via --i) */
    .pop { animation: pop var(--t) var(--ease-spring) both; animation-delay: calc(var(--i, 0) * 22ms); }
    @keyframes pop { from { opacity: 0; transform: translateY(10px) scale(.96); } to { opacity: 1; transform: none; } }
    /* FLIP move helper: set transition then transform=0 to animate layout deltas */
    .flip { transition: transform var(--t) var(--ease-spring); }
    /* Brand mark draw + pulse on the splash */
    .ring { stroke-dasharray: 1; stroke-dashoffset: 1; animation: draw 1.1s var(--ease-emphatic) forwards, spin 1.4s linear .9s infinite; transform-origin: center; }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

    /* ===================== Splash / shell ===================== */
    .app { height: 100vh; display: grid; place-items: center; }
    .splash { text-align: center; animation: pop var(--t-slow) var(--ease-emphatic) both; }
    .logo { width: 76px; height: 76px; margin: 0 auto 18px; }
    .logo svg { width: 100%; height: 100%; }
    .brand { font-size: 30px; font-weight: 700; letter-spacing: -.5px; background: var(--accent-grad);
      -webkit-background-clip: text; background-clip: text; color: transparent; }
    .tag { color: var(--text-muted); font-size: 14px; margin-top: 6px; }
    .env { display: none; margin-top: 10px; font-size: 11px; font-weight: 700; letter-spacing: .5px;
      color: #f59e0b; border: 1px solid #f59e0b; border-radius: 6px; padding: 2px 8px; }
    .bar { width: 220px; height: 4px; margin: 22px auto 0; border-radius: 4px; overflow: hidden; background: var(--surface-2); }
    .bar > i { display: block; height: 100%; width: 40%; border-radius: 4px; background: var(--accent-grad);
      animation: slide 1.1s var(--ease-smooth) infinite; }
    @keyframes slide { 0% { transform: translateX(-120%); } 100% { transform: translateX(320%); } }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="splash" role="status" aria-live="polite">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 100 100" fill="none">
          <circle class="ring" cx="50" cy="50" r="40" stroke="url(#g)" stroke-width="7" stroke-linecap="round" pathLength="1"/>
          <path d="M50 28 L66 64 H34 Z" fill="url(#g)"/>
          <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/>
          </linearGradient></defs>
        </svg>
      </div>
      <div class="brand">Atlas</div>
      <div class="tag" id="tag">Project &amp; Resource Operations</div>
      <div class="env" id="env"></div>
      <div class="bar" aria-hidden="true"><i></i></div>
    </div>
  </div>

  <script>
  (function () {
    "use strict";
    /* ===================== Config (canonical names — see PLAN.md §3.1) ===================== */
    var APP = "atlas";   // VERIFY at registration: actual app link_name
    var $ = function (id) { return document.getElementById(id); };

    /* ===================== SDK wrapper (resolve only on code 3000) ===================== */
    function call(method, cfg) {
      return ZOHO.CREATOR.API[method](cfg).then(function (res) {
        if (res && res.code === 3000) return res;
        var e = new Error((res && (res.message || res.description)) || "SDK error " + (res && res.code));
        e.response = res; throw e;
      });
    }

    /* ===================== Store skeleton (Phase 1 fills this) =====================
       In-memory, ID-keyed Maps + secondary indexes; hydrate-once via paginated reads
       (server-side `criteria` now VERIFIED — scope reads per view); optimistic write
       queue with pool-6 + backoff and version compare-and-swap. */
    var Store = {
      byId: {},          // entity -> Map(ID -> record)
      index: {},         // e.g. tasksByProject
      get: function (entity, id) { var m = this.byId[entity]; return m && m.get(String(id)); },
      hydrate: function () { /* Phase 1: paginated criteria-scoped loads into Maps + indexes */ }
    };

    /* ===================== Router skeleton (hash-based SPA) ===================== */
    var Router = {
      route: function () { return (location.hash || "#portfolio").replace(/^#/, ""); },
      go: function (r) { location.hash = r; },
      render: function () { /* Phase 1+: mount the view for Router.route() with .view transition */ }
    };
    window.addEventListener("hashchange", function () { Router.render(); });

    /* ===================== Context (VERIFIED: getInitParams is SYNCHRONOUS) ===================== */
    function applyContext() {
      try {
        var u = (ZOHO.CREATOR.UTIL && ZOHO.CREATOR.UTIL.getInitParams) ? ZOHO.CREATOR.UTIL.getInitParams() : null;
        if (!u) return;
        if (u.appLinkName) APP = u.appLinkName;
        if (u.themeBrandColor) document.documentElement.style.setProperty("--accent", u.themeBrandColor);
        var env = u.envUrlFragment || "";  // "" = production
        if (/development|stage/i.test(env)) { var b = $("env"); b.textContent = /stage/i.test(env) ? "STAGE" : "DEV"; b.style.display = "inline-block"; }
        // u.loginUser (email) → matched to a Member for "My Work" in Phase 2.
      } catch (e) { /* never block boot on context */ }
    }

    /* ===================== Boot ===================== */
    function boot() {
      if (typeof ZOHO === "undefined" || !ZOHO.CREATOR) { $("tag").textContent = "Open Atlas from inside the Creator app."; return; }
      ZOHO.CREATOR.init().then(function () {
        applyContext();
        // Phase 1: Store.hydrate() → Router.render(). For now the animated splash stands in.
        $("tag").textContent = "Connected · building the workspace…";
      }).catch(function () { $("tag").textContent = "Couldn't reach Zoho Creator."; });
    }
    if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot); else boot();
    // expose for probes/tests
    window.Atlas = { Store: Store, Router: Router, call: call };
  })();
  </script>
</body>
</html>
